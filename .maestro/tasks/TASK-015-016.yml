appId: com.takemepic.app
# TASK-015 + TASK-016 UI/UX polish — Release build.
#
# Exercises the unauthenticated path that the changes touch: app boots cleanly
# with the new Button loading state, the restyled JournalSwitch, the
# KeyboardAvoidingView on profile setup, and the language picker all bundled,
# and the login screen (fixed password-eye alignment) renders.
#
# The home "active now" toggle, the removed home filter slider, the settings
# language picker, and the removed "visible on map" row sit behind the auth gate
# → verified manually on a logged-in device; this flow covers boot + the login
# screen that holds the password-field fix.
---
- launchApp:
    clearState: true
- tapOn:
    text: ".*(Allow|Don.t Allow|Not Now|Autoriser|Ne pas autoriser){1}.*"
    optional: true
- extendedWaitUntil:
    visible: ".*(tap to begin|appuie pour commencer|اضغط للبدء|toca para empezar|sign in|se connecter|next|suivant|skip|selfies).*"
    timeout: 20000
# Try to reach the login screen (holds the password field whose eye icon was realigned).
- tapOn:
    point: "50%,50%"
- tapOn:
    text: ".*(se connecter|sign in|تسجيل الدخول|inicia sesión).*"
    optional: true
- assertVisible: ".*(tap to begin|appuie pour commencer|اضغط للبدء|toca para empezar|CONNEXION|SIGN IN|se connecter|sign in|mot de passe|password).*"
