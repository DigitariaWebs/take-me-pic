appId: com.takemepic.app
# Avatar storage is a backend/storage-policy slice — its acceptance criteria
# (owner-scoped upload, public read, persistence) are verified via migration
# 0004 + manual/RLS checks, not the UI. This flow is the app-boot smoke so the
# build stays green; the picker UI is a deferred follow-up (see task notes).
---
- launchApp
- extendedWaitUntil:
    visible: ".*(appuie pour commencer|tap to begin|اضغط للبدء|toca para empezar).*"
    timeout: 12000
- assertVisible: ".*(appuie pour commencer|tap to begin|اضغط للبدء|toca para empezar).*"
